<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cssStylesheet.css">
    <title>Document</title>
</head>
<body onload="update()">
    <!-- Load d3.js -->
<script src="https://d3js.org/d3.v4.js"></script>
<div id = 'titlePage'>
  <center>
    <h1>Incassi attività Horeca</h1>
</center>
</div>


<!-- Add 2 buttons -->
<center>
<button onclick="update(data,'Lecco')">Lecco</button>
<button onclick="update(data,'Milano')">Milano</button>
</center>
<!-- Create a div where the graph will take place -->
<div>
    <center id="my_dataviz"></center>
</div>
<script>

    // create 2 data_set


var data_csv = []
d3.csv("https://raw.githubusercontent.com/LorenzoMauri/LorenzoMauri.github.io/master/DATIcartellaDiProva.csv")
        .get(function(data) {
        var data_csv = data
        });


console.log(data_csv)
    var data =  [
       {cat: "Ristorante", value: 20, group : 'Lecco',venduto:1000},
       {cat: "Bar", value: 10,group : 'Lecco',venduto:2000},
       {cat: "Gelateria", value: 8,group : 'Milano',venduto:359200},
       {cat: "Hotel", value: 5,group : 'Milano',venduto:900000},
       {cat: "Piadineria", value: 10,group : 'Lecco',venduto:900},
       {cat: "Pub", value: 10,group : 'Milano',venduto: 1346803}
    ];
    
    // set the dimensions and margins of the graph
    var margin = {top: 30, right: 30, bottom: 70, left: 60},
        width = 460 - margin.left - margin.right,
        height = 400 - margin.top - margin.bottom;
    
    // append the svg object to the body of the page
    var svg = d3.select("#my_dataviz")
      .append("svg")
        .attr("width", width + margin.left + margin.right)
        .attr("height", height + margin.top + margin.bottom)
      .append("g")
        .attr("transform",
              "translate(" + margin.left+ "," + margin.top + ")");
    
    // X axis
    var x = d3.scaleBand()
      .range([ 0, width ])
      .domain(data.map(function(d) { return d.cat; }))
      .padding(0.2);
    svg.append("g")
      .attr("transform", "translate(0," + height + ")")
      .call(d3.axisBottom(x))
    
    // Add Y axis
    var y = d3.scaleLinear()
      .domain([0, 20])
      .range([ height, 0]);
    svg.append("g")
      .attr("class", "myYaxis")
      .call(d3.axisLeft(y));
    
    // A function that create / update the plot for a given variable:
    function update(data,citta) {
      
      if (citta == 'Lecco'){
        document.getElementById("tooltip_title").textContent = 'Via Palestro';
        document.getElementById("immagine").src = "https://raw.githubusercontent.com/LorenzoMauri/LorenzoMauri.github.io/master/lecco.png"
      } else {
        document.getElementById("tooltip_title").textContent = 'Piazza Duomo';
        document.getElementById("immagine").src = "https://raw.githubusercontent.com/LorenzoMauri/LorenzoMauri.github.io/master/milan.png"}
      
        
      
      var u = svg.selectAll("rect")
        .data(data.filter(function(data) {
            
            return data.group == citta;
}))
       
    

      u
        .enter()
        .append("rect")
        
        .on('click',function(data){
            document.getElementById("mySidenav").style.width = "350px";
            document.getElementById("main").style.marginLeft = "250px";
            document.body.style.backgroundColor = "rgba(0,0,0,0.1)";
        })
        .on('mouseover',function(data){
            document.getElementById('fatturato').textContent= data.cat 
            ;   
            document.getElementById('venduto').textContent= data.value + '€'
            
        })
        //.on('mouseout',function(){
          //  document.getElementById("mySidenav").style.width = "0";
            //document.getElementById("main").style.marginLeft = "0";
            //document.body.style.backgroundColor = "white";

        //})
        .merge(u)
        .transition()
        .duration(1000)
          .attr("x", function(d) { return x(d.cat); })
          .attr("y", function(d) { return y(d.value); })
          .attr("width", x.bandwidth())
          .attr("height", function(d) { return height - y(d.value); })
          .attr("fill", "#69b3a2")


    }
    


    // Initialize the plot with the first dataset
    update(data)
    
    
    function closeNav(){
       
          document.getElementById("mySidenav").style.width = "0";
          document.getElementById("main").style.marginLeft = "0";
          document.body.style.backgroundColor = "white";

        
    }

    
                
   

    </script>

<!--parte di html-->



<div id="mySidenav" class="sidenav">
    <center id = "tooltip_title">
      <h3>None</h3>
    </center>
    <div id="img_tooltip_container">
      <img  id = 'immagine' src=""></img>
    </div>
    
    <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
    <center>
    <div id = 'metriche'>
    <a> 
      Tipologia di attività
      <p id= "fatturato">-</p>
    </a>
    <a href="#">Incassi  <p id= "venduto">-</p></a>

  </div>
</center>
  </div>
  

  
  <!-- Add all page content inside this div if you want the side nav to push page content to the right (not used if you only want the sidenav to sit on top of the page -->
  <div id="main">
    ...
  </div>

  
</body>
</html>
